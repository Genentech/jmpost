---
name: Docs 📚

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "inst/templates/**"
      - "_pkgdown.*"
      - DESCRIPTION
      - "**.md"
      - "**.Rmd"
      - "man/**"
      - "LICENSE.*"
      - NAMESPACE
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - develop
    paths:
      - "inst/templates/**"
      - "_pkgdown.*"
      - DESCRIPTION
      - "**.md"
      - "**.Rmd"
      - "man/**"
      - "LICENSE.*"
      - NAMESPACE
  workflow_dispatch:

jobs:
  docs:
    name: Pkgdown Docs 📚
    uses: insightsengineering/r.pkg.template/.github/workflows/pkgdown.yaml@main
    secrets:
      REPO_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      deps-installation-method: |
        staged-dependencies
      additional-env-vars: |
        CMDSTAN=/root/.cmdstan
        CMDSTAN_PATH=/root/.cmdstan
        CMDSTANR_NO_VER_CHECK=true
        NOT_CRAN=TRUE
        JMPOST_GRAPH_SNAPSHOT=TRUE
      default-landing-page: 'main' # Set to 'latest-tag' after CRAN release or when you create a tag
